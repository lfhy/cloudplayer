# Builds desktop release assets and publishes available artifacts on tagged releases.
name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  windows-amd64:
    name: windows-amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          if (!(Test-Path "$nsisDir\makensis.exe")) {
            throw "makensis.exe not found in $nsisDir"
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisDir\makensis.exe" -VERSION

      - name: Build Windows amd64 assets
        run: ./scripts/build_desktop_packages.sh --targets windows/amd64 --skip-windows-dual --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-windows-amd64
          path: |
            bin/releases-github/windows/amd64/cloudplayer-windows-amd64.exe
            bin/releases-github/windows/amd64/cloudplayer-windows-amd64-installer.exe
          if-no-files-found: error

  windows-arm64:
    name: windows-arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          if (!(Test-Path "$nsisDir\makensis.exe")) {
            throw "makensis.exe not found in $nsisDir"
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisDir\makensis.exe" -VERSION

      - name: Build Windows arm64 assets
        run: ./scripts/build_desktop_packages.sh --targets windows/arm64 --skip-windows-dual --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-windows-arm64
          path: |
            bin/releases-github/windows/arm64/cloudplayer-windows-arm64.exe
            bin/releases-github/windows/arm64/cloudplayer-windows-arm64-installer.exe
          if-no-files-found: error

  windows-dual:
    name: windows-dual
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          if (!(Test-Path "$nsisDir\makensis.exe")) {
            throw "makensis.exe not found in $nsisDir"
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisDir\makensis.exe" -VERSION

      - name: Build Windows dual-arch installer
        run: ./scripts/build_desktop_packages.sh --targets windows/amd64,windows/arm64 --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-windows-amd64-arm64-installer
          path: bin/releases-github/windows/dual/cloudplayer-windows-amd64-arm64-installer.exe
          if-no-files-found: error

  macos-amd64:
    name: macos-amd64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS amd64 assets
        run: ./scripts/build_desktop_packages.sh --targets macos/amd64 --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-darwin-amd64
          path: bin/releases-github/macos/amd64/cloudplayer-darwin-amd64.dmg
          if-no-files-found: error

  macos-arm64:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS arm64 assets
        run: ./scripts/build_desktop_packages.sh --targets macos/arm64 --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-darwin-arm64
          path: bin/releases-github/macos/arm64/cloudplayer-darwin-arm64.dmg
          if-no-files-found: error

  macos-universal:
    name: macos-universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS universal assets
        run: ./scripts/build_desktop_packages.sh --targets macos/amd64,macos/arm64 --include-macos-universal --release-dir bin/releases-github

      - uses: actions/upload-artifact@v4
        with:
          name: cloudplayer-darwin-universal
          path: bin/releases-github/macos/universal/cloudplayer-darwin-universal.dmg
          if-no-files-found: error

  publish:
    name: publish
    if: always()
    runs-on: ubuntu-latest
    needs:
      - windows-amd64
      - windows-arm64
      - windows-dual
      - macos-amd64
      - macos-arm64
      - macos-universal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Show collected assets
        run: find dist/release -type f | sort

      - name: Detect available assets
        id: assets
        run: |
          if find dist/release -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.assets.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: CloudPlayer ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: .github/release-body-zh.md
          files: dist/release/**/*
          fail_on_unmatched_files: true
