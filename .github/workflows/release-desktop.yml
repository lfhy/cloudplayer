# Builds portable desktop release archives on version tags and publishes them
# to a GitHub release, mirroring the legacy Wails desktop release trigger.
name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  windows-x64:
    name: windows-x64
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows x64 archive
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform windows \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/windows

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-windows-x64
          path: dist/windows/cloudplayer-windows-x64.zip
          if-no-files-found: error

  macos:
    name: macos
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS archive
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform macos \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/macos

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-darwin
          path: dist/macos/*.zip
          if-no-files-found: error

  publish:
    name: publish
    if: always()
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - macos
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate release body
        env:
          TARGET_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
          OUTPUT_FILE: dist/release-body.md
        run: ./scripts/generate_release_body.sh

      - name: Show collected assets
        run: find dist/release -type f | sort

      - name: Detect available assets
        id: assets
        run: |
          if find dist/release -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.assets.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: CloudPlayer ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: dist/release-body.md
          files: dist/release/**/*
          fail_on_unmatched_files: true
