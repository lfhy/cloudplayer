# Builds desktop release assets per target and publishes collected artifacts in one release job.
name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.inputs.tag_name || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  windows-amd64:
    name: windows-amd64
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Configure Windows toolchain
        run: |
          echo "C:/msys64/ucrt64/bin" >> "$GITHUB_PATH"
          echo "CC=gcc" >> "$GITHUB_ENV"
          echo "CXX=g++" >> "$GITHUB_ENV"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows amd64 packages
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform windows \
            --arch amd64 \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/windows/amd64

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-windows-amd64
          path: dist/windows/amd64/*
          if-no-files-found: error

  macos-amd64:
    name: macos-amd64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS amd64 packages
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform macos \
            --arch amd64 \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/macos/amd64

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-darwin-amd64
          path: dist/macos/amd64/*
          if-no-files-found: error

  macos-arm64:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS arm64 packages
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform macos \
            --arch arm64 \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/macos/arm64

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-darwin-arm64
          path: dist/macos/arm64/*
          if-no-files-found: error

  macos-universal:
    name: macos-universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS universal packages
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform macos \
            --arch universal \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/macos/universal

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-darwin-universal
          path: dist/macos/universal/*
          if-no-files-found: error

  publish:
    name: publish
    if: always()
    runs-on: ubuntu-latest
    needs:
      - windows-amd64
      - macos-amd64
      - macos-arm64
      - macos-universal
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate release body
        env:
          TARGET_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
          OUTPUT_FILE: dist/release-body.md
        run: ./scripts/generate_release_body.sh

      - name: Show collected assets
        run: find dist/release -type f | sort

      - name: Detect available assets
        id: assets
        run: |
          if find dist/release -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.assets.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: CloudPlayer ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: dist/release-body.md
          files: dist/release/**/*
          fail_on_unmatched_files: true
