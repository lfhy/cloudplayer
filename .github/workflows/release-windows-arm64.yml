# Builds and publishes the Windows arm64 desktop release assets on version tags.
name: release-windows-arm64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-arm64-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  publish:
    name: windows-arm64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: CLANGARM64
          install: mingw-w64-clang-aarch64-toolchain

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Configure Windows toolchain
        run: |
          echo "C:/msys64/clangarm64/bin" >> "$GITHUB_PATH"
          echo "CC=C:/msys64/clangarm64/bin/clang.exe" >> "$GITHUB_ENV"
          echo "CXX=C:/msys64/clangarm64/bin/clang++.exe" >> "$GITHUB_ENV"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows arm64 packages
        env:
          RAW_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          VERSION_NAME="${RAW_TAG#v}"
          flutter pub get
          ./scripts/build_desktop_packages.sh \
            --platform windows \
            --arch arm64 \
            --version "$VERSION_NAME" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist/windows/arm64

      - uses: actions/upload-artifact@v6
        with:
          name: cloudplayer-windows-arm64
          path: dist/windows/arm64/*
          if-no-files-found: error

      - name: Generate release body
        env:
          TARGET_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
          OUTPUT_FILE: dist/release-body.md
        run: ./scripts/generate_release_body.sh

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          ./scripts/publish_release_assets.sh \
            --tag "$TARGET_TAG" \
            --name "CloudPlayer $TARGET_TAG" \
            --body-file dist/release-body.md \
            dist/windows/arm64/cloudplayer-windows-arm64.zip \
            dist/windows/arm64/cloudplayer-windows-arm64-installer.exe
