<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面歌词</title>
    <script type="module" src="/src/desktop_lyrics.js"></script>
    <style>
      :root {
        --ly-radius: 16px;
        --ly-scale: 1;
        --ly-pt: calc(20pt * var(--ly-scale));
        --ly-text: #ffffff;
      }
      html {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        border-radius: var(--ly-radius);
        isolation: isolate;
      }
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        border-radius: var(--ly-radius);
        font-family: "Microsoft YaHei UI", "PingFang SC", "Segoe UI", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      body:not(.lyrics-locked) #ly-frame {
        cursor: move;
      }
      .frame {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        min-height: 100%;
        border-radius: var(--ly-radius);
        overflow: hidden;
        pointer-events: auto;
      }
      .wrap {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 10px 18px;
        gap: 6px;
        border-radius: var(--ly-radius);
        overflow: hidden;
        background: transparent;
        border: none;
        outline: none;
        box-shadow: none;
        isolation: isolate;
        pointer-events: none;
        transition:
          box-shadow 0.18s ease,
          background 0.18s ease;
      }
      /* 未锁定：阴影 + 工具栏仅 .frame:hover（.wrap 为 none 不能接受 hover） */
      body:not(.lyrics-locked) .wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.18s ease;
        background: rgba(10, 14, 22, 0.38);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.42),
          0 0 0 1px rgba(255, 255, 255, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      body:not(.lyrics-locked) .frame:hover .wrap::before {
        opacity: 1;
      }
      body:not(.lyrics-locked) .ly-toolbar {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
      }
      body:not(.lyrics-locked) .frame:hover .ly-toolbar {
        opacity: 1;
        pointer-events: auto;
      }
      /* 锁定：完全穿透，工具栏隐藏（解锁仅主窗口菜单） */
      body.lyrics-locked .wrap::before {
        display: none;
      }
      body.lyrics-locked .ly-scale {
        display: none !important;
      }
      body.lyrics-locked .ly-toolbar {
        display: none;
      }
      .ly-toolbar {
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 8;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: default;
      }
      .ly-tool {
        margin: 0;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(12, 18, 28, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        cursor: pointer;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        flex-shrink: 0;
      }
      .ly-tool:hover {
        background: rgba(22, 32, 48, 0.72);
      }
      .ly-scale {
        display: flex;
        gap: 2px;
      }
      .ly-scale button {
        min-width: 26px;
        padding: 2px 0;
        font-size: 13px;
        line-height: 1.1;
      }
      .l1,
      .l2 {
        position: relative;
        z-index: 1;
        margin: 0;
        pointer-events: none;
        font-size: var(--ly-pt);
        font-weight: 600;
        line-height: 1.22;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        max-width: 100%;
        user-select: none;
        -webkit-user-select: none;
      }
      .l1 {
        align-self: flex-start;
        text-align: left;
      }
      .ly-char {
        color: #ffffff;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.88),
          0 0 8px rgba(0, 0, 0, 0.25);
      }
      .l2 {
        align-self: flex-end;
        text-align: right;
        opacity: 0.92;
        font-size: calc(var(--ly-pt) * 0.85);
        color: var(--ly-text);
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.88),
          0 0 8px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="frame" id="ly-frame">
      <div class="ly-toolbar" id="ly-toolbar">
        <button type="button" class="ly-tool" id="btn-ly-lock" title="锁定（解锁请用主窗口 ⋯ 菜单）">
          锁定
        </button>
        <span class="ly-scale">
          <button type="button" class="ly-tool" id="ly-minus" title="缩小字号">−</button>
          <button type="button" class="ly-tool" id="ly-plus" title="放大字号">+</button>
        </span>
      </div>
      <div class="wrap">
        <p class="l1" id="line1">桌面歌词</p>
        <p class="l2" id="line2">锁定后请在主窗口 ⋯ 菜单解锁</p>
      </div>
    </div>
  </body>
</html>
