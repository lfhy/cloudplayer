<!doctype html>
<!-- Desktop lyrics context menu lives in its own popup window. -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歌词菜单</title>
    <script>
      globalThis.__CLOUDPLAYER_WINDOW_NAME__ = "lyrics-context-menu";
    </script>
    <script type="module" src="/src/desktop_lyrics_menu.js"></script>
  </head>
  <body>
    <div id="ly-context-menu" class="ly-menu" role="menu" aria-label="歌词菜单">
      <button type="button" id="ly-menu-close" class="ly-menu-item">关闭歌词</button>
      <button type="button" id="ly-menu-replace" class="ly-menu-item">更换歌词</button>
      <button type="button" id="ly-menu-minus" class="ly-menu-item">缩小字号</button>
      <button type="button" id="ly-menu-plus" class="ly-menu-item">放大字号</button>
      <button type="button" id="ly-menu-lock" class="ly-menu-item">锁定歌词窗口</button>
    </div>
  </body>
</html>
