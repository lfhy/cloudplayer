<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudPlayer</title>
    <script>
      globalThis.__CLOUDPLAYER_WINDOW_NAME__ = "tray-player";
    </script>
    <script type="module" src="/src/tray_player.js"></script>
    <style>
      :root {
        --accent: #c62f2f;
        --accent-rgb: 198, 47, 47;
        --text: rgba(255, 255, 255, 0.96);
        --muted: rgba(255, 255, 255, 0.68);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      }
      body {
        position: relative;
        padding: 8px 14px 14px;
        box-sizing: border-box;
        background: transparent;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.08);
        pointer-events: none;
      }
      .tray-card {
        position: relative;
        z-index: 1;
        min-height: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
      }
      .tray-cover {
        width: 96px;
        height: 96px;
        border-radius: 14px;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.08);
      }
      .tray-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 16px;
      }
      .tray-meta {
        min-width: 0;
      }
      .tray-title {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.2;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tray-sub {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.35;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tray-progress {
        margin-top: 14px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      .tray-progress__bar {
        width: 18%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.85), rgba(var(--accent-rgb), 0.55));
      }
      .tray-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .tray-transport {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tray-btn {
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .tray-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .tray-btn:disabled {
        opacity: 0.38;
        cursor: default;
      }
      .tray-btn--small {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }
      .tray-btn--primary {
        width: 40px;
        height: 40px;
        font-size: 18px;
        background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.94), rgba(var(--accent-rgb), 0.78));
        color: #fff;
      }
      .tray-open {
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .tray-empty .tray-cover {
        opacity: 0.9;
      }
      .tray-empty .tray-progress__bar {
        width: 0;
      }
    </style>
  </head>
  <body>
    <div class="tray-card tray-empty" id="tray-card">
      <img id="tray-cover" class="tray-cover" alt="" />
      <div class="tray-main">
        <div class="tray-meta">
          <h1 id="tray-title" class="tray-title">CloudPlayer</h1>
          <div id="tray-sub" class="tray-sub">从菜单栏快速控制当前播放</div>
          <div class="tray-progress" aria-hidden="true">
            <div class="tray-progress__bar" id="tray-progress"></div>
          </div>
        </div>
        <div class="tray-controls">
          <div class="tray-transport">
            <button type="button" id="tray-prev" class="tray-btn tray-btn--small" title="上一首" aria-label="上一首">⏮</button>
            <button type="button" id="tray-play" class="tray-btn tray-btn--primary" title="播放" aria-label="播放">▶</button>
            <button type="button" id="tray-next" class="tray-btn tray-btn--small" title="下一首" aria-label="下一首">⏭</button>
          </div>
          <button type="button" id="tray-open" class="tray-btn tray-open" title="展开主窗口">打开</button>
        </div>
      </div>
    </div>
  </body>
</html>
