<!doctype html>
<!-- Desktop lyrics window bootstraps the standalone overlay renderer. -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面歌词</title>
    <script>
      globalThis.__CLOUDPLAYER_WINDOW_NAME__ = "lyrics";
    </script>
    <script type="module" src="/src/desktop_lyrics.js"></script>
    <style>
      :root {
        --ly-radius: 16px;
        --ly-scale: 1;
        --ly-pt: calc(20pt * var(--ly-scale));
        --ly-text: #ffffff;
      }
      html {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        border-radius: var(--ly-radius);
        isolation: isolate;
      }
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        border-radius: var(--ly-radius);
        font-family: "Microsoft YaHei UI", "PingFang SC", "Segoe UI", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      body:not(.lyrics-locked) #ly-frame {
        cursor: move;
      }
      .frame {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        min-height: 100%;
        border-radius: var(--ly-radius);
        overflow: hidden;
        pointer-events: auto;
      }
      .ly-drag-region {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 28px;
        z-index: 1;
        pointer-events: auto;
        cursor: move;
      }
      [data-tauri-drag-region] {
        --wails-draggable: drag;
      }
      .wrap {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 10px 18px;
        gap: 6px;
        border-radius: var(--ly-radius);
        overflow: hidden;
        background: transparent;
        border: none;
        outline: none;
        box-shadow: none;
        isolation: isolate;
        pointer-events: none;
        transition:
          box-shadow 0.18s ease,
          background 0.18s ease;
      }
      /* 未锁定：阴影 + 工具栏仅 .frame:hover（.wrap 为 none 不能接受 hover） */
      body:not(.lyrics-locked) .wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.18s ease;
        background: rgba(10, 14, 22, 0.38);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.42),
          0 0 0 1px rgba(255, 255, 255, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      body:not(.lyrics-locked) .frame:hover .wrap::before,
      body:not(.lyrics-locked).lyrics-hovering .wrap::before {
        opacity: 1;
      }
      body:not(.lyrics-locked) .ly-toolbar,
      body:not(.lyrics-locked) .ly-lock-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
      }
      body:not(.lyrics-locked) .frame:hover .ly-toolbar,
      body:not(.lyrics-locked) .frame:hover .ly-lock-btn,
      body:not(.lyrics-locked).lyrics-hovering .ly-toolbar,
      body:not(.lyrics-locked).lyrics-hovering .ly-lock-btn {
        opacity: 1;
        pointer-events: auto;
      }
      /* 锁定后，歌词主体让开鼠标，顶部改由独立解锁按钮接管 */
      body.lyrics-locked .wrap::before {
        display: none;
      }
      body.lyrics-locked .ly-scale {
        display: none !important;
      }
      body.lyrics-locked .ly-lock-btn {
        opacity: 0;
        pointer-events: none;
      }
      body.lyrics-locked .ly-toolbar {
        display: none;
      }
      body.lyrics-locked .ly-drag-region {
        display: none;
      }
      .ly-lock-btn,
      .ly-tool {
        margin: 0;
        box-sizing: border-box;
        width: 32px;
        height: 32px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.94);
        background: rgba(12, 18, 28, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        cursor: pointer;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        box-shadow:
          0 10px 26px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .ly-lock-btn:hover,
      .ly-tool:hover {
        background: rgba(24, 34, 50, 0.74);
      }
      .ly-lock-btn {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      .ly-toolbar {
        position: absolute;
        top: 8px;
        right: 10px;
        z-index: 8;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ly-menu {
        position: fixed;
        z-index: 50;
        min-width: 168px;
        padding: 6px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(10, 14, 22, 0.86);
        box-shadow:
          0 16px 36px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
      }
      .ly-menu[hidden] {
        display: none !important;
      }
      .ly-menu-item {
        width: 100%;
        height: 30px;
        margin: 0;
        padding: 0 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.95);
        text-align: left;
        font-size: 12px;
        line-height: 30px;
        cursor: pointer;
      }
      .ly-menu-item:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .ly-menu-item + .ly-menu-item {
        margin-top: 2px;
      }
      .ly-scale {
        display: flex;
        gap: 6px;
      }
      .ly-icon {
        width: 16px;
        height: 16px;
        display: block;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .l1,
      .l2 {
        position: relative;
        z-index: 1;
        margin: 0;
        pointer-events: none;
        font-size: var(--ly-pt);
        font-weight: 600;
        line-height: 1.22;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        max-width: 100%;
        user-select: none;
        -webkit-user-select: none;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.85),
          0 0 10px rgba(90, 170, 255, 0.28);
      }
      .l1 {
        align-self: flex-start;
        text-align: left;
      }
      .ly-char {
        color: #ffffff;
      }
      .l2 {
        align-self: flex-end;
        text-align: right;
        opacity: 0.92;
        font-size: calc(var(--ly-pt) * 0.85);
        color: var(--ly-text);
      }
    </style>
  </head>
  <body>
    <div class="frame" id="ly-frame">
      <div class="ly-drag-region" id="ly-drag-region" data-tauri-drag-region aria-hidden="true"></div>
      <button type="button" class="ly-lock-btn" id="btn-ly-lock" title="锁定桌面歌词" aria-label="锁定桌面歌词">
        <svg class="ly-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 10V7.8a3.5 3.5 0 0 1 7 0V10"></path>
          <rect x="6.5" y="10" width="11" height="9.5" rx="2.4"></rect>
          <path d="M12 13.5v2.2"></path>
        </svg>
      </button>
      <div class="ly-toolbar" id="ly-toolbar">
        <button type="button" class="ly-tool" id="ly-close" title="关闭歌词" aria-label="关闭歌词">
          <svg class="ly-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.5 6.5 17.5 17.5"></path>
            <path d="M17.5 6.5 6.5 17.5"></path>
          </svg>
        </button>
        <button type="button" class="ly-tool" id="ly-replace" title="更换歌词" aria-label="更换歌词">
          <svg class="ly-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 1 1-2.34-5.66"></path>
            <path d="M20 4v7h-7"></path>
          </svg>
        </button>
        <span class="ly-scale">
          <button type="button" class="ly-tool" id="ly-minus" title="缩小字号" aria-label="缩小字号">
            <svg class="ly-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 12h10"></path>
            </svg>
          </button>
          <button type="button" class="ly-tool" id="ly-plus" title="放大字号" aria-label="放大字号">
            <svg class="ly-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 7v10"></path>
              <path d="M7 12h10"></path>
            </svg>
          </button>
        </span>
      </div>
      <div class="wrap">
        <p class="l1" id="line1">CloudPlayer</p>
        <p class="l2" id="line2">让音乐陪你此刻</p>
      </div>
    </div>
    <div id="ly-context-menu" class="ly-menu" hidden>
      <button type="button" id="ly-menu-close" class="ly-menu-item">关闭歌词</button>
      <button type="button" id="ly-menu-replace" class="ly-menu-item">更换歌词</button>
      <button type="button" id="ly-menu-minus" class="ly-menu-item">缩小字号</button>
      <button type="button" id="ly-menu-plus" class="ly-menu-item">放大字号</button>
      <button type="button" id="ly-menu-lock" class="ly-menu-item">锁定歌词窗口</button>
    </div>
  </body>
</html>
