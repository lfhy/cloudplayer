version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "CloudPlayer"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  release:desktop:
    summary: Builds Windows and macOS release packages across architectures
    cmds:
      - ./scripts/build_desktop_packages.sh {{if .TARGETS}}--targets {{.TARGETS}}{{end}} {{if .WINDOWS_FORMAT}}--windows-format {{.WINDOWS_FORMAT}}{{end}} {{if .RELEASE_DIR}}--release-dir {{.RELEASE_DIR}}{{end}} {{if eq .INCLUDE_MACOS_UNIVERSAL "true"}}--include-macos-universal{{end}} {{if eq .USE_WINDOWS_CGO "1"}}--use-windows-cgo{{end}} {{if eq .SKIP_CLEAN "true"}}--skip-clean{{end}}

  release:desktop:dry-run:
    summary: Prints the desktop release commands without executing them
    cmds:
      - ./scripts/build_desktop_packages.sh --dry-run {{if .TARGETS}}--targets {{.TARGETS}}{{end}} {{if .WINDOWS_FORMAT}}--windows-format {{.WINDOWS_FORMAT}}{{end}} {{if eq .INCLUDE_MACOS_UNIVERSAL "true"}}--include-macos-universal{{end}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
